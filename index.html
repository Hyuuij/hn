<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة استخراج الأكواد | Steam Guard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.4.2/sha.js"></script>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>بوابة استخراج الأكواد</h2>
            <p>أدخل بيانات الطلب للحصول على كود Steam Guard</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="orderID" placeholder="رقم الطلب (Order ID)">
            <input type="text" id="user" placeholder="اسم الحساب (Username)">
        </div>
        
        <button onclick="startExtraction()">استخراج الكود الآن</button>
        
        <div id="resultArea" class="result-box">
            <div id="steamCode" class="display-code">-----</div>
            <div id="timerBar" class="timer-text"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
